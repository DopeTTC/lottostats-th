name: Update Lottery Data

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of every month at 09:00 UTC (4pm Thailand)
    - cron: '0 9 16 * *'  # 16th of every month at 09:00 UTC (4pm Thailand)
  workflow_dispatch:       # allow manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "Auto-update lottery data $(date +'%Y-%m-%d')"
          git push
